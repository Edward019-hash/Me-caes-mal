<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edward-Night ✨ Me caes mal...</title>
<style>
  body {
    background: linear-gradient(135deg, #0a0f1e 0%, #1e1b4b 100%);
    text-align: center;
    font-family: 'Poppins', sans-serif;
    color: #e0f2fe;
    margin: 0;
    overflow: hidden;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .container {
    background: rgba(15, 23, 42, 0.6);
    backdrop-filter: blur(10px);
    border-radius: 30px;
    padding: 30px 25px;
    box-shadow: 0 0 40px rgba(59, 130, 246, 0.3);
    border: 1px solid rgba(96, 165, 250, 0.3);
    max-width: 500px;
    width: 90%;
    margin: 20px;
  }

  h1 {
    font-size: 28px;
    margin-top: 0;
    margin-bottom: 20px;
    color: #60a5fa;
    text-shadow: 0 0 10px #3b82f6, 0 0 20px #3b82f6;
  }

  img {
    width: 250px;
    height: auto;
    margin: 15px 0 25px;
    border-radius: 15px;
    box-shadow: 0 0 20px rgba(139, 92, 246, 0.4);
  }

  .buttons {
    margin-top: 10px;
    display: flex;
    gap: 15px;
    justify-content: center;
  }

  button {
    font-size: 18px;
    font-family: 'Poppins', sans-serif;
    padding: 12px 30px;
    margin: 0;
    border: none;
    border-radius: 40px;
    cursor: pointer;
    transition: all 0.3s ease;
    color: white;
    font-weight: 600;
  }

  #yes {
    background: linear-gradient(90deg, #3b82f6, #60a5fa);
    box-shadow: 0 0 15px #3b82f6;
  }

  #yes:hover {
    background: linear-gradient(90deg, #2563eb, #3b82f6);
    box-shadow: 0 0 25px #60a5fa;
    transform: scale(1.02);
  }

  #no {
    background: linear-gradient(90deg, #8b5cf6, #a855f7);
    box-shadow: 0 0 15px #8b5cf6;
  }

  #no:hover {
    background: linear-gradient(90deg, #7c3aed, #8b5cf6);
    box-shadow: 0 0 25px #a855f7;
    transform: scale(1.02);
  }

  #response {
    font-size: 22px;
    margin-top: 30px;
    font-weight: 500;
    color: #e0f2fe;
    transition: 0.5s;
  }

  .emoji {
    font-size: 45px;
    animation: float 1.3s ease-out;
  }

  @keyframes float {
    0% { transform: translateY(15px); opacity: 0; }
    100% { transform: translateY(-25px); opacity: 1; }
  }

  /* CRÉDITO EDWARD-NIGHT */
  .credit {
    position: fixed;
    bottom: 15px;
    right: 18px;
    font-size: 11px;
    background: rgba(0,0,0,0.5);
    padding: 5px 12px;
    border-radius: 30px;
    backdrop-filter: blur(5px);
    color: #94a3b8;
    z-index: 200;
    font-family: monospace;
    letter-spacing: 0.8px;
  }
  .credit span {
    color: #60a5fa;
    font-weight: bold;
  }
</style>
</head>
<body>
  <div class="container">
    <h1>💙 ¿Sabías que me caes mal... muy, muy mal? 💙</h1>
    <img src="https://uploads.onecompiler.io/43yt5tbfe/43yz9gdkp/624ee3dc22b4a0a19e2ac20f842171cc.gif" alt="gif cute">

    <div class="buttons">
      <button id="yes" onclick="responder('yes')">💙 Sí 💙</button>
      <button id="no" onclick="responder('no')">💜 No 💜</button>
    </div>

    <div id="response"></div>
  </div>

  <!-- CRÉDITO -->
  <div class="credit">Hecho por <span>Edward-Night</span> ✨</div>

  <script>
    function responder(option) {
      const response = document.getElementById("response");
      response.innerHTML = "";
      const emoji = document.createElement("div");
      emoji.classList.add("emoji");

      if (option === "yes") {
        emoji.textContent = "💙";
        response.style.color = "#60a5fa";
        response.textContent = "💙 Sí, me caes mal... ¿nos besamos!? 🙈💙";
      } else {
        emoji.textContent = "💜";
        response.style.color = "#8b5cf6";
        response.textContent = "💜 ¿No? Entonces explícame por qué invades mi cabeza!? 💜";
      }

      document.body.appendChild(emoji);
      setTimeout(() => emoji.remove(), 1300);
    }
  </script>
</body>
</html>
